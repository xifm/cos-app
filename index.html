<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CosApp 终极全频道扒站神器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1e272e; color: white; padding: 20px; padding-bottom: 100px; margin: 0; }
        .header { text-align: center; margin-bottom: 20px; }
        
        .nav-bar { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .nav-bar button { padding: 10px 20px; font-size: 16px; background: #2f3640; color: #bdc3c7; border: 2px solid #34495e; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nav-bar button:hover { background: #34495e; color: white; }
        .nav-bar button.active { background: #e74c3c; color: white; border-color: #c0392b; box-shadow: 0 0 10px rgba(231, 76, 60, 0.5); }

        .controls-bar { display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; background: rgba(47, 54, 64, 0.6); padding: 15px; border-radius: 10px; }
        .search-box { display: flex; gap: 5px; }
        .search-box input { padding: 8px 15px; border-radius: 20px; border: none; outline: none; font-weight: bold; background: #ecf0f1; width: 200px; }
        .search-box button, .layout-box button { padding: 8px 15px; background: #3498db; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .search-box button:hover, .layout-box button:hover { background: #2980b9; }
        .layout-box { display: flex; align-items: center; gap: 8px; }
        .layout-box span { font-weight: bold; color: #f1c40f; }
        .layout-box button.active { background: #e67e22; }

        .grid-container { display: grid; gap: 20px; margin-top: 20px; }
        .grid-container.col-auto { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        .grid-container.col-1 { grid-template-columns: 1fr; }
        .grid-container.col-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-container.col-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-container.col-4 { grid-template-columns: repeat(4, 1fr); }
        
        .video-card { background: #2f3640; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border-top: 4px solid #3498db; transition: transform 0.2s; }
        .video-card:hover { transform: translateY(-5px); }
        .cover-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #111; }
        .card-content { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .video-title { font-size: 16px; margin: 0 0 10px 0; line-height: 1.4; color: #ecf0f1; }
        
        .meta-info { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; font-size: 12px; color: #bdc3c7; }
        .meta-info span { background: rgba(0, 0, 0, 0.4); padding: 4px 8px; border-radius: 6px; display: flex; align-items: center; gap: 4px; }
        
        .ext-info { background: #1e272e; padding: 10px; border-radius: 6px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 6px; }
        .info-row { font-size: 13px; color: #bdc3c7; line-height: 1.5; }
        .info-label { color: #f39c12; font-weight: bold; margin-right: 4px; }
        
        .jump-link { color: #3498db; cursor: pointer; text-decoration: none; transition: 0.2s; }
        .jump-link:hover { color: #e74c3c; text-decoration: underline; text-underline-offset: 3px; }
        
        .link-box { margin-top: auto; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 5px; border-left: 3px solid #2ecc71; font-size: 13px; }
        .links-flex { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .dl-btn { background: #2ecc71; color: white; padding: 6px 12px; border-radius: 4px; text-decoration: none; display: inline-block; font-weight: bold; }
        .dl-btn:hover { background: #27ae60; }
        .dl-btn.alt { background: #9b59b6; }
        .dl-btn.alt:hover { background: #8e44ad; }

        .pagination { 
            display: flex; justify-content: center; align-items: center; gap: 15px; 
            background: rgba(47, 54, 64, 0.9); backdrop-filter: blur(10px); 
            padding: 15px 25px; border-radius: 50px; position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.8); flex-wrap: wrap; width: max-content; max-width: 90%; border: 1px solid rgba(255,255,255,0.1);
        }
        .pagination button { padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .pagination button:hover { background: #2980b9; transform: scale(1.05); }
        .pagination input { padding: 10px; width: 60px; text-align: center; border-radius: 20px; border: none; font-weight: bold; font-size: 16px; outline: none; background: rgba(255,255,255,0.9); }
        .page-info { font-size: 16px; font-weight: bold; color: #f1c40f; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        
        #status-msg { text-align: center; color: #e74c3c; font-weight: bold; margin-top: 20px; font-size: 18px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>🚀 CosApp 终极全频道聚合神器</h2>
    </div>

    <div class="nav-bar" id="nav-bar">
        <button class="active" onclick="switchCategory('order=mr', this)">🔥 最新</button>
        <button onclick="switchCategory('order=mv', this)">👑 热门</button>
        <button onclick="switchCategory('tags=%E7%8B%AC%E5%AE%B6', this)">💎 独家</button>
        <button onclick="switchCategory('ct=8', this)">🎬 FC2</button>
        <button onclick="switchCategory('ct=2', this)">🔞 AV</button>
        <button onclick="switchCategory('ct=1', this)">🌸 同人</button>
        <button onclick="switchCategory('kw=崩坏 星穹铁道 绝区零 原神', this)">💫 米哈游</button>
    </div>

    <div class="controls-bar">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="输入片名或车牌号..." onkeydown="if(event.key==='Enter') executeSearch()">
            <button onclick="executeSearch()">🔍 搜索</button>
        </div>
        <div class="layout-box">
            <span>⚙️ 布局:</span>
            <button onclick="setColumns(1)" id="btn-col-1">1列</button>
            <button onclick="setColumns(2)" id="btn-col-2">2列</button>
            <button onclick="setColumns(3)" id="btn-col-3">3列</button>
            <button onclick="setColumns(4)" id="btn-col-4">4列</button>
            <button onclick="setColumns('auto')" id="btn-col-auto" class="active">自适应</button>
        </div>
    </div>

    <div id="status-msg"></div>
    <div id="result" class="grid-container col-auto"></div>

    <div class="pagination">
        <button onclick="changePage(-1)">◀ 上一页</button>
        <span class="page-info" id="current-page-display">加载中...</span>
        <button onclick="changePage(1)">下一页 ▶</button>
        <div style="width: 2px; height: 30px; background: rgba(255,255,255,0.2); margin: 0 5px;"></div>
        <input type="number" id="jump-input" value="1" min="1" max="999">
        <button onclick="jumpPage()" style="background: #e67e22;">跳转</button>
    </div>

    <script>
        const rawKey = "CosAppMakeBigMoneyCosplayAPPContent";
        const keyMd5 = CryptoJS.MD5(rawKey); 
        const keyMd5HexWord = CryptoJS.enc.Utf8.parse(keyMd5.toString()); 
        
        let MAX_PAGE = 999; 
        let currentPage = 1; 
        let currentCategory = 'order=mr'; 

        function switchCategory(queryStr, btnElement) {
            document.querySelectorAll('.nav-bar button').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
            currentCategory = queryStr;
            currentPage = 1;
            document.getElementById('jump-input').value = currentPage;
            fetchVideos(currentPage);
        }

        function executeSearch() {
            const keyword = document.getElementById('search-input').value.trim();
            if (!keyword) return alert('请输入搜索内容！');
            document.querySelectorAll('.nav-bar button').forEach(btn => btn.classList.remove('active'));
            currentCategory = `keyword=${encodeURIComponent(keyword)}`;
            currentPage = 1;
            document.getElementById('jump-input').value = currentPage;
            fetchVideos(currentPage);
        }

        function searchByTag(tag) {
            document.querySelectorAll('.nav-bar button').forEach(btn => btn.classList.remove('active'));
            document.getElementById('search-input').value = tag;
            currentCategory = `tags=${encodeURIComponent(tag)}`;
            currentPage = 1;
            document.getElementById('jump-input').value = currentPage;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            fetchVideos(currentPage);
        }

        function setColumns(num) {
            const grid = document.getElementById('result');
            grid.className = 'grid-container'; 
            grid.classList.add(`col-${num}`);
            document.querySelectorAll('.layout-box button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-col-${num}`).classList.add('active');
        }

        function decryptData(encryptedText) {
            const strategies = [
                { name: "基础款", key: keyMd5, mode: CryptoJS.mode.ECB, iv: null },
                { name: "加强款", key: keyMd5, mode: CryptoJS.mode.CBC, iv: CryptoJS.enc.Hex.parse("00000000000000000000000000000000") },
                { name: "双重MD5款", key: keyMd5, mode: CryptoJS.mode.CBC, iv: keyMd5 },
                { name: "长钥匙款", key: keyMd5HexWord, mode: CryptoJS.mode.ECB, iv: null }
            ];
            for (let strat of strategies) {
                try {
                    let cfg = { mode: strat.mode, padding: CryptoJS.pad.Pkcs7 };
                    if (strat.iv) cfg.iv = strat.iv;
                    let dec1 = CryptoJS.AES.decrypt(encryptedText, strat.key, cfg);
                    let str1 = dec1.toString(CryptoJS.enc.Utf8);
                    if (str1 && (str1.startsWith("{") || str1.startsWith("["))) return str1;
                    let hexCipher = CryptoJS.enc.Hex.parse(encryptedText);
                    let base64Cipher = CryptoJS.enc.Base64.stringify(hexCipher);
                    let dec2 = CryptoJS.AES.decrypt(base64Cipher, strat.key, cfg);
                    let str2 = dec2.toString(CryptoJS.enc.Utf8);
                    if (str2 && (str2.startsWith("{") || str2.startsWith("["))) return str2;
                } catch (e) {}
            }
            return null;
        }

        function formatTime(val) {
            if (!val) return "未知";
            let num = Number(val);
            if (!isNaN(num)) {
                if (num < 100000000000) num *= 1000; 
                let d = new Date(num);
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            }
            return String(val).split(' ')[0]; 
        }

        function createJumpTags(label, valStrOrArr) {
            if (!valStrOrArr) return "";
            let arr = Array.isArray(valStrOrArr) ? valStrOrArr : String(valStrOrArr).split(',');
            let htmlLinks = arr.map(v => `<span class="jump-link" onclick="searchByTag('${v.trim()}')">${v.trim()}</span>`).join(", ");
            return `<div class="info-row"><span class="info-label">${label}:</span> ${htmlLinks}</div>`;
        }

        function changePage(delta) {
            let newPage = currentPage + delta;
            if (newPage < 1) return alert("已经是第一页了！");
            if (newPage > MAX_PAGE) return alert(`⚠️ 数据到底啦！当前板块最多只有 ${MAX_PAGE} 页！`);
            currentPage = newPage;
            document.getElementById('jump-input').value = currentPage;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            fetchVideos(currentPage);
        }

        function jumpPage() {
            let inputPage = parseInt(document.getElementById('jump-input').value);
            if (inputPage >= 1 && inputPage <= MAX_PAGE) {
                currentPage = inputPage;
                window.scrollTo({ top: 0, behavior: 'smooth' });
                fetchVideos(currentPage);
            } else {
                alert(`⚠️ 跳转拦截：页码必须在 1 到 ${MAX_PAGE} 之间！`);
                document.getElementById('jump-input').value = currentPage; 
            }
        }

        async function fetchVideos(pageNumber) {
            const resultDiv = document.getElementById("result");
            const statusMsg = document.getElementById("status-msg");
            const pageDisplay = document.getElementById('current-page-display');
            
            resultDiv.innerHTML = ""; 
            statusMsg.innerHTML = "📡 正在潜入服务器拉取列表...";
            pageDisplay.innerText = `第 ${pageNumber} 页 / 搜索中...`;

            const token = "CosAppMakeBigMoney," + Math.floor(Date.now() / 1000);
            let apiPage = pageNumber - 1; 
            if(apiPage < 0) apiPage = 0;
            
            const apiUrl = `https://api.cos-dkop.net/api/app/v1/video/lists?${currentCategory}&page=${apiPage}&limit=30`;

            try {
                const response = await fetch(apiUrl, { method: "GET", headers: { "Content-Type": "application/json", "Tokenparam": token }});
                const json = await response.json();
                
                if (json.code === 200 || json.code === 0) {
                    const decryptedStr = decryptData(json.data);
                    if (decryptedStr) {
                        const parsedData = JSON.parse(decryptedStr); 
                        
                        // 🚀 【V2 穿甲版】深度分页嗅探引擎
                        let extractedTotalPages = 0;
                        
                        // 多重嵌套搜索：不管官方把页码藏在哪一层，都能挖出来
                        const searchTargets = [parsedData, parsedData.data, parsedData.info, parsedData.list, json, json.data];
                        
                        for (let obj of searchTargets) {
                            if (!obj || typeof obj !== 'object' || Array.isArray(obj)) continue;
                            
                            // 1. 直取真经：找直接代表页码的字段
                            if (obj.last_page !== undefined) { extractedTotalPages = Number(obj.last_page); break; }
                            if (obj.total_page !== undefined) { extractedTotalPages = Number(obj.total_page); break; }
                            if (obj.pages !== undefined) { extractedTotalPages = Number(obj.pages); break; }
                            if (obj.pagecount !== undefined) { extractedTotalPages = Number(obj.pagecount); break; }
                            
                            // 2. 曲线救国：通过 total (总视频条数) 反推
                            if (obj.total !== undefined) {
                                let totalVal = Number(obj.total);
                                let limit = Number(obj.limit || obj.per_page || 30);
                                if (totalVal > 0) {
                                    let calcPages = Math.ceil(totalVal / limit);
                                    // 防呆设计：如果算出总页数比当前页还小，说明这货返回的 total 根本就是页数！
                                    if (calcPages < currentPage && totalVal >= currentPage) {
                                        extractedTotalPages = totalVal; 
                                    } else {
                                        extractedTotalPages = calcPages;
                                    }
                                    break;
                                }
                            }
                        }

                        // 无脑抓取视频列表，强力防崩溃
                        let videoList = [];
                        if (Array.isArray(parsedData)) videoList = parsedData;
                        else if (parsedData) {
                            if (Array.isArray(parsedData.list)) videoList = parsedData.list;
                            else if (parsedData.data && Array.isArray(parsedData.data.list)) videoList = parsedData.data.list;
                            else if (Array.isArray(parsedData.data)) videoList = parsedData.data;
                            else if (Array.isArray(parsedData.info)) videoList = parsedData.info;
                        }

                        // 弹性兜底机制：即使服务器真的没给页数，也不锁死你的翻页！
                        if (extractedTotalPages <= 0 || isNaN(extractedTotalPages)) {
                            if (videoList.length >= 10) { 
                                // 当前页还有不少数据，假装总页码还有很多，让你随便跳
                                MAX_PAGE = 999; 
                                pageDisplay.innerText = `第 ${currentPage} 页 / 未知`;
                            } else {
                                MAX_PAGE = currentPage; 
                                pageDisplay.innerText = `第 ${currentPage} 页 (已到底)`;
                            }
                        } else {
                            MAX_PAGE = extractedTotalPages;
                            // 强制防呆：如果抓到的最大页比当前页还小，强行续命
                            if (MAX_PAGE < currentPage && videoList.length > 0) MAX_PAGE = currentPage + 1;
                            pageDisplay.innerText = `第 ${currentPage} 页 / 共 ${MAX_PAGE} 页`;
                        }
                        
                        document.getElementById('jump-input').max = MAX_PAGE;

                        if(videoList.length === 0) {
                            statusMsg.innerHTML = "⚠️ 这一页没有数据了。";
                            return;
                        }

                        statusMsg.innerHTML = `✅ 成功获取 ${videoList.length} 个作品！正在全自动并发提取防盗链...`;
                        
                        let html = '';
                        videoList.forEach(video => {
                            let rawTime = video.addtime || video.created_at || video.time || video.update_time || video.vod_time;
                            let uploadDate = formatTime(rawTime);
                            let viewCount = video.views || video.play_count || video.click || video.play_num || video.vod_hits;
                            let viewsText = viewCount !== undefined ? `👁️ ${viewCount}` : "";
                            let duration = video.duration || video.play_time || video.length || video.vod_duration;
                            let durationText = duration ? `⏱️ ${duration}` : "";

                            let extInfoHtml = "";
                            extInfoHtml += createJumpTags("🎫 番号", video.code || video.sn || video.vod_serial);
                            extInfoHtml += createJumpTags("🎭 登场", video.actor || video.stars || video.model || video.vod_actor);
                            extInfoHtml += createJumpTags("🎬 作品", video.work || video.movie);
                            extInfoHtml += createJumpTags("🏢 片商", video.studio || video.maker || video.company);
                            extInfoHtml += createJumpTags("📺 系列", video.series || video.vod_series);
                            
                            if (video.tags && video.tags.length > 0) {
                                extInfoHtml += createJumpTags("🏷️ 标签", video.tags);
                            }

                            let extPanel = extInfoHtml ? `<div class="ext-info">${extInfoHtml}</div>` : "";

                            html += `
                            <div class="video-card">
                                <img class="cover-img" src="${video.photo || ''}" alt="封面">
                                <div class="card-content">
                                    <h4 class="video-title">🎬 ${video.title || "未命名"}</h4>
                                    
                                    <div class="meta-info">
                                        <span>📅 ${uploadDate}</span>
                                        ${durationText ? `<span>${durationText}</span>` : ""}
                                        ${viewsText ? `<span>${viewsText}</span>` : ""}
                                    </div>

                                    ${extPanel}

                                    <div class="link-box" id="detail-${video.id}">
                                        <span style="color:#f39c12">⏳ 破解路线中...</span>
                                    </div>
                                </div>
                            </div>`;
                        });
                        resultDiv.innerHTML = html;

                        videoList.forEach(video => {
                            autoFetchDetail(video.id);
                        });

                    } else {
                        statusMsg.innerHTML = "❌ 数据解密失败。";
                    }
                }
            } catch (error) {
                statusMsg.innerHTML = `❌ 网络异常：${error.message}`;
                pageDisplay.innerText = `第 ${currentPage} 页 (异常)`;
            }
        }

        async function autoFetchDetail(videoId) {
            const detailBox = document.getElementById(`detail-${videoId}`);
            const token = "CosAppMakeBigMoney," + Math.floor(Date.now() / 1000);
            const detailUrl = `https://api.cos-dkop.net/api/app/v1/video/videoinfo?id=${videoId}`;

            try {
                const response = await fetch(detailUrl, { method: "GET", headers: { "Content-Type": "application/json", "Tokenparam": token }});
                const json = await response.json();
                
                if (json.code === 200 || json.code === 0) {
                    const decryptedStr = decryptData(json.data);
                    if (decryptedStr) {
                        const detailData = JSON.parse(decryptedStr);
                        let target = detailData.data || detailData.info || detailData;
                        let realUrl = target.url || target.video_url || target.play_url || target.m3u8 || target.file || target.play;

                        if (realUrl) {
                            let urlArray = [];
                            if (Array.isArray(realUrl)) urlArray = realUrl;
                            else if (typeof realUrl === 'string') urlArray = realUrl.split(',');
                            else urlArray = [String(realUrl)];

                            let linksHtml = `<div style="color:#2ecc71; margin-bottom:5px;"><b>🔓 破解成功：</b></div><div class="links-flex">`;
                            
                            urlArray.forEach((link, index) => {
                                if(link.trim() !== '') {
                                    let btnClass = index === 0 ? "dl-btn" : "dl-btn alt";
                                    linksHtml += `<a href="${link.trim()}" target="_blank" class="${btnClass}">▶ 路线 ${index + 1}</a>`;
                                }
                            });
                            linksHtml += `</div>`;
                            detailBox.innerHTML = linksHtml;
                        } else {
                            detailBox.innerHTML = `<span style="color:#e74c3c">⚠️ 未找到链接</span>`;
                        }
                    }
                } else {
                    detailBox.innerHTML = `<span style="color:#e74c3c">❌ VIP限制</span>`;
                }
            } catch (error) {
                detailBox.innerHTML = `<span style="color:#e74c3c">❌ 获取失败</span>`;
            }
        }

        window.onload = function() {
            fetchVideos(1);
        };
    </script>
</body>
</html>
